<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In – Smart Campus</title>
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #f1f5f9;
    }
    .card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.95rem;
        cursor: pointer;
        transition: color 0.2s ease;
        margin-bottom: 10px;
        align-self: flex-start;
    }
    .back-btn:hover {
        color: #38bdf8;
    }
    .logo {
        margin: 0 auto 20px auto;
        width: 90px;
        height: auto;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .logo img {
        width: 100%;
        height: auto;
        object-fit: contain;
    }
    h2.title {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 25px;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    /* Form */
    .form {
        display: flex;
        flex-direction: column;
        text-align: left;
    }
    .form label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #94a3b8;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .form input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #ffffff;
        font-size: 1rem;
        font-family: inherit;
        margin-bottom: 20px;
        transition: all 0.3s ease;
    }
    .form input:focus {
        outline: none;
        border-color: #0ea5e9;
        background: rgba(15, 23, 42, 0.8);
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
    }
    .password-box {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
    }
    .password-box input {
        margin-bottom: 0;
        padding-right: 50px;
    }
    .password-toggle-icon {
        position: absolute;
        right: 16px;
        cursor: pointer;
        color: #94a3b8;
        font-size: 1.2rem;
        user-select: none;
        transition: color 0.2s ease;
    }
    .password-toggle-icon:hover {
        color: #38bdf8;
    }
    .form button {
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: #ffffff;
        border: none;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 30px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }
    .form button:hover {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(14, 165, 233, 0.4);
    }
    .form button:active {
        transform: translateY(0);
    }
    .signUp {
        margin-top: 25px;
        text-align: center;
        font-size: 0.95rem;
        color: #94a3b8;
    }
    .signUp a {
        color: #38bdf8;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
    }
    .signUp a:hover {
        color: #0ea5e9;
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="card">
    <div class="back-btn" onclick="goBack()">
        <span>←</span> Back
    </div>
    
    <div class="logo">
        <img src="images/gramin_logo.png" alt="Gramin Logo">
    </div>

    <h2 class="title">Sign In To College Campus</h2>

    <form class="form" id="loginForm">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="Enter Email" required>

        <label for="loginPassword">Password</label>
        <div class="password-box">
            <input type="password" id="loginPassword" placeholder="Enter Password" required>
            <span class="password-toggle-icon" onclick="togglePassword('loginPassword')">👁️</span>
        </div>

        <button type="submit">Sign In</button>

        <p class="signUp">
            New here?
            <a href="signUp.html">Create Account</a>
        </p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
